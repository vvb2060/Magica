
plugins {
    id 'com.android.application'
}



android {
    apply from: rootProject.file('gradle/prefab_bypass.gradle')
    ndkVersion '23.1.7779620'
    defaultConfig {
        applicationId 'io.github.vvb2060.puellamagi'
        minSdkVersion 29
        compileSdk 35
        targetSdkVersion 35
        versionCode 3
        versionName '1.2'
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }
    namespace 'io.github.vvb2060.puellamagi'
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.debug
            proguardFiles 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
        ndkBuild.path 'src/main/jni/Android.mk'
    }
    buildFeatures {
        viewBinding true
        aidl true
        buildConfig true
        prefab true
    }
    dependencies {
        implementation 'com.bytedance:bytehook:1.1.1'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    packagingOptions {
        pickFirst '**/libbytehook.so'
        resources {
            excludes += '**'
        }
    }
    dependenciesInfo {
        includeInApk false
    }
    lint {
        checkReleaseBuilds false
    }
}
